<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的商店</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, query, where, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiUusg7TFWiRrTaKDGE8uKdfrL6ynWPEo",
  authDomain: "augus-8a19a.firebaseapp.com",
  projectId: "augus-8a19a",
  storageBucket: "augus-8a19a.firebasestorage.app",
  messagingSenderId: "742192421015",
  appId: "1:742192421015:web:ab6c6a8e3656f7f090f1d2"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── 狀態 ──
let cart = JSON.parse(localStorage.getItem('cart')||'[]');
let allProducts = [];
let currentUser = null;
let currentPage = 'home';

// ── 登入狀態 ──
onAuthStateChanged(auth, user => {
  currentUser = user;
  const loginBtn  = document.getElementById('nav-login');
  const logoutBtn = document.getElementById('nav-logout');
  const userName  = document.getElementById('nav-username');
  if (user) {
    loginBtn.style.display  = 'none';
    logoutBtn.style.display = 'flex';
    userName.textContent    = user.displayName || user.email.split('@')[0];
  } else {
    loginBtn.style.display  = 'flex';
    logoutBtn.style.display = 'none';
  }
  updateCartBadge();
});

// ── 頁面切換 ──
window.showPage = (page) => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+page).classList.add('active');
  currentPage = page;
  window.scrollTo(0,0);
  if (page==='shop')    loadProducts();
  if (page==='cart')    renderCart();
  if (page==='orders')  loadMyOrders();
  if (page==='account') renderAccount();
};

// ══════════════════════════════════════
//  商品
// ══════════════════════════════════════
async function loadProducts(keyword='', category='') {
  document.getElementById('products-grid').innerHTML = '<div class="loading">⏳ 載入商品中...</div>';
  try {
    const snap = await getDocs(collection(db,'products'));
    allProducts = snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.狀態==='上架');
  } catch(e) { allProducts=[]; }
  renderProducts(keyword, category);
}

function renderProducts(keyword='', category='') {
  let list = allProducts;
  if (keyword) list = list.filter(p=>(p.商品名稱||'').includes(keyword)||(p.類別||'').includes(keyword));
  if (category && category!=='全部') list = list.filter(p=>p.類別===category);

  // 類別篩選
  const cats = ['全部',...new Set(allProducts.map(p=>p.類別||'其他').filter(Boolean))];
  document.getElementById('cat-filter').innerHTML = cats.map(c=>
    `<button class="cat-btn ${c===(category||'全部')?'active':''}" onclick="filterCat('${c}')">${c}</button>`
  ).join('');

  const grid = document.getElementById('products-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><div style="font-size:48px">🛍️</div><p>目前沒有商品</p><small>請至後台新增並設為「上架」</small></div>';
    return;
  }
  grid.innerHTML = list.map(p => `
    <div class="product-card" onclick="openProduct('${p.id}')">
      <div class="product-img">${p.emoji||'📦'}</div>
      <div class="product-info">
        <div class="product-cat">${p.類別||'商品'}</div>
        <div class="product-name">${p.商品名稱||'商品名稱'}</div>
        <div class="product-bottom">
          <span class="product-price">$${Number(p.價格||0).toLocaleString()}</span>
          <span class="product-stock ${Number(p.庫存數量)<1?'out':''}">${Number(p.庫存數量)<1?'已售完':Number(p.庫存數量)<10?`剩 ${p.庫存數量} 件`:'有庫存'}</span>
        </div>
        <button class="add-cart-btn ${Number(p.庫存數量)<1?'disabled':''}" onclick="event.stopPropagation();addToCart('${p.id}')" ${Number(p.庫存數量)<1?'disabled':''}>
          ${Number(p.庫存數量)<1?'已售完':'🛒 加入購物車'}
        </button>
      </div>
    </div>`).join('');
}

let currentCat = '';
window.filterCat = (cat) => { currentCat=cat==='全部'?'':cat; renderProducts(document.getElementById('search-input').value, currentCat); };
window.searchProducts = () => renderProducts(document.getElementById('search-input').value, currentCat);

// 商品詳細
window.openProduct = (id) => {
  const p = allProducts.find(p=>p.id===id);
  if (!p) return;
  document.getElementById('modal-product').innerHTML = `
    <div class="product-modal-img">${p.emoji||'📦'}</div>
    <div class="product-modal-cat">${p.類別||'商品'}</div>
    <h2 class="product-modal-name">${p.商品名稱||'—'}</h2>
    <div class="product-modal-price">$${Number(p.價格||0).toLocaleString()}</div>
    <div class="product-modal-desc">${p.描述||'暫無商品描述。'}</div>
    <div class="product-modal-stock">庫存：${p.庫存數量||0} 件</div>
    <button class="add-cart-btn-lg ${Number(p.庫存數量)<1?'disabled':''}" onclick="addToCart('${p.id}');closeProductModal()" ${Number(p.庫存數量)<1?'disabled':''}>
      ${Number(p.庫存數量)<1?'已售完':'🛒 加入購物車'}
    </button>`;
  document.getElementById('product-modal-bg').classList.add('open');
};
window.closeProductModal = () => document.getElementById('product-modal-bg').classList.remove('open');

// ══════════════════════════════════════
//  購物車
// ══════════════════════════════════════
window.addToCart = (id) => {
  const p = allProducts.find(p=>p.id===id);
  if (!p || Number(p.庫存數量)<1) return;
  const exist = cart.find(c=>c.id===id);
  if (exist) exist.qty = Math.min(exist.qty+1, Number(p.庫存數量));
  else cart.push({id, name:p.商品名稱, price:Number(p.價格||0), qty:1, emoji:p.emoji||'📦'});
  saveCart();
  toast('已加入購物車 🛒');
};

window.removeFromCart = (id) => { cart=cart.filter(c=>c.id!==id); saveCart(); renderCart(); };
window.changeQty = (id, delta) => {
  const item = cart.find(c=>c.id===id);
  if (!item) return;
  item.qty = Math.max(1, item.qty+delta);
  const p = allProducts.find(p=>p.id===id);
  if (p) item.qty = Math.min(item.qty, Number(p.庫存數量));
  saveCart(); renderCart();
};

function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); }
function updateCartBadge() {
  const total = cart.reduce((s,c)=>s+c.qty,0);
  document.querySelectorAll('.cart-badge').forEach(el=>{ el.textContent=total; el.style.display=total?'flex':'none'; });
}

function renderCart() {
  const container = document.getElementById('cart-items');
  if (!cart.length) {
    container.innerHTML = '<div class="empty-state"><div style="font-size:48px">🛒</div><p>購物車是空的</p><button class="btn-primary" onclick="showPage(\'shop\')">去逛逛</button></div>';
    document.getElementById('cart-summary').style.display='none';
    return;
  }
  const subtotal = cart.reduce((s,c)=>s+c.price*c.qty,0);
  container.innerHTML = cart.map(c=>`
    <div class="cart-item">
      <div class="cart-item-emoji">${c.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${c.name}</div>
        <div class="cart-item-price">$${c.price.toLocaleString()} 元</div>
      </div>
      <div class="cart-item-qty">
        <button onclick="changeQty('${c.id}',-1)">－</button>
        <span>${c.qty}</span>
        <button onclick="changeQty('${c.id}',1)">＋</button>
      </div>
      <div class="cart-item-total">$${(c.price*c.qty).toLocaleString()}</div>
      <button class="cart-remove" onclick="removeFromCart('${c.id}')">✕</button>
    </div>`).join('');
  document.getElementById('cart-subtotal').textContent = '$'+subtotal.toLocaleString();
  document.getElementById('cart-summary').style.display='block';
}

// ══════════════════════════════════════
//  結帳
// ══════════════════════════════════════
window.goCheckout = () => {
  if (!currentUser) { toast('請先登入才能結帳 🔐','error'); showPage('account'); return; }
  if (!cart.length) { toast('購物車是空的','error'); return; }
  // 填入預設資訊
  document.getElementById('checkout-email').value = currentUser.email;
  document.getElementById('checkout-name').value  = currentUser.displayName||'';
  showPage('checkout');
};

window.submitOrder = async () => {
  const name    = document.getElementById('checkout-name').value.trim();
  const phone   = document.getElementById('checkout-phone').value.trim();
  const address = document.getElementById('checkout-address').value.trim();
  const payment = document.getElementById('checkout-payment').value;
  if (!name||!phone||!address) { toast('請填寫完整收件資訊','error'); return; }

  const subtotal = cart.reduce((s,c)=>s+c.price*c.qty,0);
  const orderNo  = 'ORD-'+Date.now().toString().slice(-8);

  try {
    await addDoc(collection(db,'orders'),{
      訂單編號: orderNo,
      客戶名稱: name,
      客戶Email: currentUser?.email||'',
      電話: phone,
      地址: address,
      付款方式: payment,
      商品清單: JSON.stringify(cart.map(c=>({名稱:c.name,數量:c.qty,單價:c.price}))),
      金額: subtotal,
      狀態: '待付款',
      備註: '',
      createdAt: serverTimestamp()
    });
    // 清空購物車
    cart=[];saveCart();
    document.getElementById('order-result-no').textContent=orderNo;
    document.getElementById('order-result-total').textContent='$'+subtotal.toLocaleString();
    showPage('order-success');
    toast('訂單成立！🎉');
  } catch(e) { toast('訂單送出失敗：'+e.message,'error'); }
};

// ══════════════════════════════════════
//  我的訂單
// ══════════════════════════════════════
async function loadMyOrders() {
  if (!currentUser) { document.getElementById('orders-list').innerHTML='<div class="empty-state"><p>請先登入</p><button class="btn-primary" onclick="showPage(\'account\')">去登入</button></div>'; return; }
  document.getElementById('orders-list').innerHTML='<div class="loading">⏳ 載入中...</div>';
  try {
    const snap = await getDocs(query(collection(db,'orders'), where('客戶Email','==',currentUser.email), orderBy('createdAt','desc')));
    const orders = snap.docs.map(d=>({id:d.id,...d.data()}));
    if (!orders.length) { document.getElementById('orders-list').innerHTML='<div class="empty-state"><div style="font-size:48px">📋</div><p>還沒有訂單</p></div>'; return; }
    const statusColor = {'待付款':'var(--orange)','處理中':'var(--accent)','待出貨':'var(--purple)','已完成':'var(--green)','已取消':'var(--red)'};
    document.getElementById('orders-list').innerHTML = orders.map(o=>`
      <div class="order-card">
        <div class="order-card-head">
          <span class="order-no">📦 ${o.訂單編號||'—'}</span>
          <span class="order-status" style="color:${statusColor[o.狀態]||'var(--t2)'}">${o.狀態||'—'}</span>
        </div>
        <div class="order-card-body">
          <div class="order-info-row"><span>金額</span><strong>$${Number(o.金額||0).toLocaleString()}</strong></div>
          <div class="order-info-row"><span>付款方式</span><span>${o.付款方式||'—'}</span></div>
          <div class="order-info-row"><span>收件地址</span><span>${o.地址||'—'}</span></div>
          <div class="order-info-row"><span>下單時間</span><span>${o.createdAt?.toDate?o.createdAt.toDate().toLocaleString('zh-TW'):'—'}</span></div>
        </div>
      </div>`).join('');
  } catch(e) { document.getElementById('orders-list').innerHTML='<div class="empty-state"><p>載入失敗，請稍後再試</p></div>'; }
}

// ══════════════════════════════════════
//  會員
// ══════════════════════════════════════
function renderAccount() {
  if (currentUser) {
    document.getElementById('account-logged-in').style.display='block';
    document.getElementById('account-logged-out').style.display='none';
    document.getElementById('account-email-show').textContent=currentUser.email;
    document.getElementById('account-name-show').textContent=currentUser.displayName||'未設定';
  } else {
    document.getElementById('account-logged-in').style.display='none';
    document.getElementById('account-logged-out').style.display='block';
  }
}

window.switchTab = (tab) => {
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('form-login').style.display  = tab==='login'?'block':'none';
  document.getElementById('form-register').style.display = tab==='register'?'block':'none';
};

window.doRegister = async () => {
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pwd   = document.getElementById('reg-pwd').value;
  const err   = document.getElementById('reg-error');
  if (!name||!email||!pwd){err.textContent='請填寫所有欄位';return;}
  if (pwd.length<6){err.textContent='密碼至少 6 個字元';return;}
  err.textContent='';
  try {
    const cred = await createUserWithEmailAndPassword(auth,email,pwd);
    await updateProfile(cred.user,{displayName:name});
    toast('註冊成功！歡迎 '+name+' 🎉');
    renderAccount();
  } catch(e) {
    const m={'auth/email-already-in-use':'此 Email 已被註冊','auth/invalid-email':'Email 格式錯誤','auth/weak-password':'密碼太簡單'};
    err.textContent=m[e.code]||'註冊失敗：'+e.message;
  }
};

window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-pwd').value;
  const err   = document.getElementById('login-error');
  if (!email||!pwd){err.textContent='請填寫帳號和密碼';return;}
  err.textContent='';
  try {
    await signInWithEmailAndPassword(auth,email,pwd);
    toast('登入成功！👋');
    renderAccount();
  } catch(e) {
    err.textContent='帳號或密碼錯誤';
  }
};

window.doLogout = async () => {
  await signOut(auth);
  toast('已登出');
  renderAccount();
};

// Toast
window.toast = (msg,type='success') => {
  const el=document.createElement('div');
  el.className='toast'+(type==='error'?' toast-error':'');
  el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3000);
};

// 初始載入
updateCartBadge();
</script>
<style>
:root{
  --bg:#f8f9fa;--white:#ffffff;--border:#e9ecef;
  --primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#eff6ff;
  --green:#16a34a;--red:#dc2626;--orange:#ea580c;--purple:#7c3aed;
  --t1:#111827;--t2:#6b7280;--t3:#9ca3af;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}

/* ─ NAV ─ */
.navbar{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:16px}
.nav-logo{font-size:20px;font-weight:800;color:var(--primary);cursor:pointer;display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-links{display:flex;gap:4px;flex:1}
.nav-link{padding:7px 14px;border-radius:8px;font-size:14px;color:var(--t2);cursor:pointer;transition:all .15s;font-weight:500;position:relative;white-space:nowrap}
.nav-link:hover{background:var(--primary-light);color:var(--primary)}
.nav-link.active{background:var(--primary-light);color:var(--primary)}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:white;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.nav-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2)}
.nav-username{font-weight:600;color:var(--t1)}
.btn-nav{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-nav-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary)}
.btn-nav-outline:hover{background:var(--primary);color:white}

/* ─ PAGES ─ */
.page{display:none;min-height:calc(100vh - 60px)}
.page.active{display:block}
.container{max-width:1200px;margin:0 auto;padding:32px 20px}

/* ─ HOME ─ */
.hero{background:linear-gradient(135deg,var(--primary) 0%,#7c3aed 100%);color:white;padding:80px 20px;text-align:center}
.hero h1{font-size:48px;font-weight:800;margin-bottom:16px;line-height:1.2}
.hero p{font-size:18px;opacity:.9;margin-bottom:32px}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-hero{padding:14px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
.btn-hero-primary{background:white;color:var(--primary)}.btn-hero-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.2)}
.btn-hero-outline{background:transparent;border:2px solid white;color:white}.btn-hero-outline:hover{background:white;color:var(--primary)}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:48px 20px;max-width:1200px;margin:0 auto}
.feature-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;box-shadow:var(--shadow)}
.feature-icon{font-size:36px;margin-bottom:12px}
.feature-title{font-size:15px;font-weight:700;margin-bottom:6px}
.feature-desc{font-size:13px;color:var(--t2)}

/* ─ SHOP ─ */
.shop-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.shop-title{font-size:22px;font-weight:700;flex:1}
.search-bar{display:flex;gap:8px;min-width:240px}
.search-bar input{flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.search-bar input:focus{border-color:var(--primary)}
.search-bar button{padding:9px 16px;background:var(--primary);color:white;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px}
.cat-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.cat-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.cat-btn:hover,.cat-btn.active{background:var(--primary);border-color:var(--primary);color:white}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.product-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);border-color:var(--primary)}
.product-img{height:160px;background:linear-gradient(135deg,#f0f4ff,#e8edff);display:flex;align-items:center;justify-content:center;font-size:64px}
.product-info{padding:16px}
.product-cat{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.product-name{font-size:15px;font-weight:700;margin-bottom:10px;line-height:1.4}
.product-bottom{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.product-price{font-size:18px;font-weight:800;color:var(--primary)}
.product-stock{font-size:11px;color:var(--green);font-weight:600}.product-stock.out{color:var(--red)}
.add-cart-btn{width:100%;padding:9px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.add-cart-btn:hover:not(.disabled){background:var(--primary-dark)}
.add-cart-btn.disabled{background:var(--border);color:var(--t3);cursor:not-allowed}

/* ─ PRODUCT MODAL ─ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal-box{background:white;border-radius:16px;padding:32px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-close-btn{position:absolute;top:16px;right:16px;background:var(--border);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-box{position:relative}
.product-modal-img{font-size:80px;text-align:center;margin-bottom:16px;background:var(--primary-light);border-radius:12px;padding:20px}
.product-modal-cat{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.product-modal-name{font-size:22px;font-weight:800;margin-bottom:8px}
.product-modal-price{font-size:28px;font-weight:800;color:var(--primary);margin-bottom:12px}
.product-modal-desc{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:12px}
.product-modal-stock{font-size:13px;color:var(--t2);margin-bottom:20px}
.add-cart-btn-lg{width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.add-cart-btn-lg:hover:not(.disabled){background:var(--primary-dark)}
.add-cart-btn-lg.disabled{background:var(--border);color:var(--t3);cursor:not-allowed}

/* ─ CART ─ */
.cart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.cart-title{font-size:22px;font-weight:700}
.cart-item{display:flex;align-items:center;gap:14px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.cart-item-emoji{font-size:40px;flex-shrink:0}
.cart-item-info{flex:1}
.cart-item-name{font-size:15px;font-weight:700;margin-bottom:4px}
.cart-item-price{font-size:13px;color:var(--t2)}
.cart-item-qty{display:flex;align-items:center;gap:10px}
.cart-item-qty button{width:28px;height:28px;border:1.5px solid var(--border);background:var(--white);border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .15s}
.cart-item-qty button:hover{border-color:var(--primary);color:var(--primary)}
.cart-item-qty span{font-size:15px;font-weight:700;min-width:24px;text-align:center}
.cart-item-total{font-size:16px;font-weight:800;color:var(--primary);min-width:80px;text-align:right}
.cart-remove{background:none;border:none;cursor:pointer;color:var(--t3);font-size:18px;padding:4px;transition:color .15s}.cart-remove:hover{color:var(--red)}
.cart-summary{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px;box-shadow:var(--shadow)}
.cart-summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.cart-summary-row:last-child{border-bottom:none}
.cart-total{font-size:20px;font-weight:800;color:var(--primary)}
.checkout-btn{width:100%;margin-top:16px;padding:14px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.checkout-btn:hover{background:var(--primary-dark)}

/* ─ CHECKOUT ─ */
.checkout-wrap{max-width:560px;margin:0 auto}
.checkout-title{font-size:22px;font-weight:700;margin-bottom:24px}
.form-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.form-section-title{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--primary)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--bg)}
.form-input:focus,.form-select:focus{border-color:var(--primary);background:white}
.order-btn{width:100%;padding:14px;background:var(--green);color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .15s}
.order-btn:hover{background:#15803d}
.back-btn{background:none;border:none;color:var(--primary);font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:16px;display:flex;align-items:center;gap:4px;font-weight:600}
.back-btn:hover{text-decoration:underline}

/* ─ ORDER SUCCESS ─ */
.success-wrap{max-width:480px;margin:60px auto;text-align:center;padding:0 20px}
.success-icon{font-size:72px;margin-bottom:20px}
.success-title{font-size:28px;font-weight:800;margin-bottom:8px;color:var(--green)}
.success-sub{font-size:15px;color:var(--t2);margin-bottom:24px}
.success-info{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px;text-align:left}
.success-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.success-row:last-child{border-bottom:none}

/* ─ ORDERS ─ */
.orders-title{font-size:22px;font-weight:700;margin-bottom:24px}
.order-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.order-card-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:var(--bg);border-bottom:1px solid var(--border)}
.order-no{font-size:14px;font-weight:700}
.order-status{font-size:13px;font-weight:700}
.order-card-body{padding:16px 20px}
.order-info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.order-info-row:last-child{border-bottom:none}
.order-info-row span:first-child{color:var(--t2)}

/* ─ ACCOUNT ─ */
.account-wrap{max-width:480px;margin:0 auto}
.account-title{font-size:22px;font-weight:700;margin-bottom:24px}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:var(--border);border-radius:10px;padding:4px}
.auth-tab{flex:1;padding:9px;border:none;background:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .15s}
.auth-tab.active{background:var(--white);color:var(--primary);box-shadow:var(--shadow)}
.auth-form{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.auth-error{font-size:12px;color:var(--red);margin-top:8px;min-height:16px}
.btn-primary{padding:11px 24px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;width:100%;margin-top:4px}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{padding:11px 24px;background:transparent;border:1.5px solid var(--border);color:var(--t1);border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;width:100%;margin-top:8px}
.btn-outline:hover{border-color:var(--red);color:var(--red)}
.profile-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow)}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#7c3aed);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:white;margin:0 auto 12px}
.profile-name{font-size:18px;font-weight:700;margin-bottom:4px}
.profile-email{font-size:13px;color:var(--t2)}

/* ─ UTILS ─ */
.empty-state{text-align:center;padding:60px 20px;color:var(--t2)}
.empty-state p{font-size:16px;margin:12px 0}
.empty-state small{font-size:12px;color:var(--t3)}
.loading{text-align:center;padding:40px;color:var(--t2);font-size:15px}
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:9999;align-items:center}
.toast{background:#111827;color:white;padding:12px 24px;border-radius:100px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:toastIn .3s ease;white-space:nowrap}
.toast-error{background:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

footer{background:var(--white);border-top:1px solid var(--border);padding:24px 20px;text-align:center;color:var(--t3);font-size:13px;margin-top:40px}
</style>
</head>
<body>

<!-- 導覽列 -->
<nav class="navbar">
  <div class="nav-inner">
    <div class="nav-logo" onclick="showPage('home')">🛍️ 我的商店</div>
    <div class="nav-links">
      <div class="nav-link active" onclick="navTo('home',this)">首頁</div>
      <div class="nav-link" onclick="navTo('shop',this)">商品</div>
      <div class="nav-link" onclick="navTo('cart',this)" style="position:relative">
        購物車 <span class="cart-badge" style="display:none">0</span>
      </div>
      <div class="nav-link" onclick="navTo('orders',this)">我的訂單</div>
    </div>
    <div class="nav-user">
      <span id="nav-username" style="display:none" class="nav-username"></span>
      <button class="btn-nav btn-nav-outline" id="nav-login" onclick="navTo('account',document.querySelector('.nav-link:last-of-type'))">登入/註冊</button>
      <button class="btn-nav btn-nav-outline" id="nav-logout" style="display:none" onclick="doLogout()">登出</button>
    </div>
  </div>
</nav>

<!-- 首頁 -->
<div class="page active" id="pg-home">
  <div class="hero">
    <h1>🛍️ 歡迎光臨</h1>
    <p>探索我們精選的好商品，享受最優質的購物體驗</p>
    <div class="hero-btns">
      <button class="btn-hero btn-hero-primary" onclick="navTo('shop')">立即購物</button>
      <button class="btn-hero btn-hero-outline" onclick="navTo('account')">會員登入</button>
    </div>
  </div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🚀</div><div class="feature-title">快速出貨</div><div class="feature-desc">訂單確認後 24 小時內出貨</div></div>
    <div class="feature-card"><div class="feature-icon">🔒</div><div class="feature-title">安全付款</div><div class="feature-desc">多種付款方式，安全有保障</div></div>
    <div class="feature-card"><div class="feature-icon">↩️</div><div class="feature-title">7天退換貨</div><div class="feature-desc">購物不滿意，輕鬆退換貨</div></div>
    <div class="feature-card"><div class="feature-icon">💬</div><div class="feature-title">客服支援</div><div class="feature-desc">專業客服團隊隨時為您服務</div></div>
  </div>
</div>

<!-- 商品頁 -->
<div class="page" id="pg-shop">
  <div class="container">
    <div class="shop-header">
      <div class="shop-title">所有商品</div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="搜尋商品..." onkeydown="if(event.key==='Enter')searchProducts()">
        <button onclick="searchProducts()">搜尋</button>
      </div>
    </div>
    <div class="cat-filter" id="cat-filter"></div>
    <div class="products-grid" id="products-grid"><div class="loading">⏳ 載入商品中...</div></div>
  </div>
</div>

<!-- 購物車 -->
<div class="page" id="pg-cart">
  <div class="container">
    <div class="cart-header">
      <div class="cart-title">🛒 購物車</div>
    </div>
    <div id="cart-items"></div>
    <div id="cart-summary" style="display:none">
      <div class="cart-summary">
        <div class="cart-summary-row"><span>小計</span><span id="cart-subtotal">$0</span></div>
        <div class="cart-summary-row"><span>運費</span><span>免運</span></div>
        <div class="cart-summary-row"><span style="font-weight:700">總計</span><span class="cart-total" id="cart-subtotal2">$0</span></div>
      </div>
      <button class="checkout-btn" onclick="goCheckout()">前往結帳 →</button>
    </div>
  </div>
</div>

<!-- 結帳 -->
<div class="page" id="pg-checkout">
  <div class="container">
    <div class="checkout-wrap">
      <button class="back-btn" onclick="showPage('cart')">← 返回購物車</button>
      <div class="checkout-title">📋 填寫收件資訊</div>
      <div class="form-section">
        <div class="form-section-title">聯絡資訊</div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="checkout-email" type="email" readonly></div>
        <div class="form-group"><label class="form-label">收件人姓名</label><input class="form-input" id="checkout-name" placeholder="王小明"></div>
        <div class="form-group"><label class="form-label">聯絡電話</label><input class="form-input" id="checkout-phone" placeholder="0912-345-678"></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">收件地址</div>
        <div class="form-group"><label class="form-label">地址</label><input class="form-input" id="checkout-address" placeholder="台北市信義區信義路五段7號"></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">付款方式</div>
        <div class="form-group">
          <select class="form-select" id="checkout-payment">
            <option>信用卡付款</option>
            <option>ATM 轉帳</option>
            <option>貨到付款</option>
            <option>LINE Pay</option>
          </select>
        </div>
      </div>
      <button class="order-btn" onclick="submitOrder()">✅ 確認下單</button>
    </div>
  </div>
</div>

<!-- 訂單成功 -->
<div class="page" id="pg-order-success">
  <div class="success-wrap">
    <div class="success-icon">🎉</div>
    <div class="success-title">訂單已成立！</div>
    <div class="success-sub">感謝您的購買，我們將盡快為您處理訂單</div>
    <div class="success-info">
      <div class="success-row"><span>訂單編號</span><strong id="order-result-no">—</strong></div>
      <div class="success-row"><span>訂單金額</span><strong id="order-result-total">—</strong></div>
      <div class="success-row"><span>訂單狀態</span><strong style="color:var(--orange)">待付款</strong></div>
    </div>
    <button class="btn-primary" onclick="navTo('orders')">查看我的訂單</button>
    <button class="btn-outline" style="margin-top:10px" onclick="navTo('shop')">繼續購物</button>
  </div>
</div>

<!-- 我的訂單 -->
<div class="page" id="pg-orders">
  <div class="container">
    <div class="orders-title">📦 我的訂單</div>
    <div id="orders-list"></div>
  </div>
</div>

<!-- 會員中心 -->
<div class="page" id="pg-account">
  <div class="container">
    <div class="account-wrap">
      <div class="account-title">👤 會員中心</div>

      <!-- 已登入 -->
      <div id="account-logged-in" style="display:none">
        <div class="profile-card">
          <div class="profile-avatar">管</div>
          <div class="profile-name" id="account-name-show">—</div>
          <div class="profile-email" id="account-email-show">—</div>
        </div>
        <button class="btn-primary" onclick="navTo('orders')">📦 查看我的訂單</button>
        <button class="btn-outline" onclick="doLogout()">登出</button>
      </div>

      <!-- 未登入 -->
      <div id="account-logged-out">
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">登入</button>
          <button class="auth-tab" id="tab-register" onclick="switchTab('register')">註冊</button>
        </div>
        <div class="auth-form" id="form-login">
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="login-email" type="email" placeholder="your@email.com"></div>
          <div class="form-group"><label class="form-label">密碼</label><input class="form-input" id="login-pwd" type="password" placeholder="••••••••"></div>
          <div class="auth-error" id="login-error"></div>
          <button class="btn-primary" onclick="doLogin()">登入</button>
        </div>
        <div class="auth-form" id="form-register" style="display:none">
          <div class="form-group"><label class="form-label">姓名</label><input class="form-input" id="reg-name" placeholder="王小明"></div>
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="reg-email" type="email" placeholder="your@email.com"></div>
          <div class="form-group"><label class="form-label">密碼（至少6碼）</label><input class="form-input" id="reg-pwd" type="password" placeholder="••••••••"></div>
          <div class="auth-error" id="reg-error"></div>
          <button class="btn-primary" onclick="doRegister()">註冊</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 商品詳細 Modal -->
<div class="modal-bg" id="product-modal-bg" onclick="if(event.target.id==='product-modal-bg')closeProductModal()">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeProductModal()">✕</button>
    <div id="modal-product"></div>
  </div>
</div>

<footer>© 2026 我的商店 · 所有商品資料來自後台管理系統</footer>
<div class="toast-wrap" id="toasts"></div>

<script>
// 導覽輔助（非 module）
function navTo(page, el) {
  document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active'));
  if (el) el.classList.add('active');
  // 呼叫 module 內的 showPage
  window.showPage(page);
}
// 購物車 summary 同步
const origShowPage = window.showPage;
window.showPage = function(page) {
  origShowPage && origShowPage(page);
  // 同步購物車總計
  setTimeout(()=>{
    const st = document.getElementById('cart-subtotal');
    const st2 = document.getElementById('cart-subtotal2');
    if (st && st2) st2.textContent = st.textContent;
  }, 50);
};
</script>
</body>
</html>
